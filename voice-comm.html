<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>FPS 音声コミュニケーター</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0f14;
    color: #e0e6f0;
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overscroll-behavior: none;
  }

  header {
    background: #111827;
    border-bottom: 2px solid #1e3a5f;
    padding: 10px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  header h1 {
    font-size: 15px;
    font-weight: 700;
    color: #60a5fa;
    white-space: nowrap;
  }

  #search {
    flex: 1;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 7px 10px;
    color: #e0e6f0;
    font-size: 14px;
    outline: none;
    min-width: 0;
  }
  #search::placeholder { color: #64748b; }
  #search:focus { border-color: #3b82f6; }

  /* Language toggle */
  #lang-toggle {
    display: flex;
    background: #1e293b;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #334155;
    flex-shrink: 0;
  }
  .lang-btn {
    padding: 6px 10px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    color: #64748b;
    transition: all 0.15s;
    user-select: none;
    border: none;
    background: none;
  }
  .lang-btn.active {
    background: #1d4ed8;
    color: #fff;
  }

  #tabs {
    display: flex;
    overflow-x: auto;
    background: #111827;
    border-bottom: 1px solid #1e293b;
    padding: 0 4px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    position: sticky;
    top: 54px;
    z-index: 99;
  }
  #tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    padding: 9px 12px;
    font-size: 12px;
    color: #64748b;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    user-select: none;
  }
  .tab.active { color: #60a5fa; border-bottom-color: #3b82f6; }
  .tab:hover { color: #94a3b8; }

  #content {
    padding: 12px;
    padding-bottom: 56px;
  }

  .category { display: none; }
  .category.active { display: block; }
  #search-results { display: none; }
  #search-results.active { display: block; }

  .category-label {
    font-size: 11px;
    font-weight: 700;
    color: #475569;
    letter-spacing: 0.1em;
    margin: 16px 0 8px 4px;
  }

  .word-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
    gap: 8px;
  }

  .word-btn {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 10px;
    padding: 10px 6px;
    text-align: center;
    cursor: pointer;
    transition: all 0.1s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    overflow: hidden;
    min-height: 56px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
  }
  .word-btn:hover { background: #1e3a5f; border-color: #3b82f6; }
  .word-btn:active, .word-btn.playing {
    background: #1d4ed8;
    border-color: #60a5fa;
    transform: scale(0.96);
  }
  .word-btn.playing::after {
    content: '▶';
    position: absolute;
    top: 3px;
    right: 5px;
    font-size: 9px;
    color: #93c5fd;
  }
  .w-ja {
    font-size: 14px;
    font-weight: 700;
    color: #e2e8f0;
    line-height: 1.2;
  }
  .w-es {
    font-size: 10px;
    color: #64748b;
    line-height: 1.2;
    word-break: break-word;
    hyphens: auto;
  }
  /* Hide sub-text of inactive language */
  body.lang-ja .w-es { display: none; }
  body.lang-es .w-es { display: block; color: #94a3b8; }
  body.lang-es .w-ja { font-size: 11px; color: #64748b; font-weight: 400; }
  body.lang-es .w-es { font-size: 14px; font-weight: 700; color: #e2e8f0; }

  .cat-0  .word-btn { border-left: 3px solid #3b82f6; }
  .cat-1  .word-btn { border-left: 3px solid #10b981; }
  .cat-2  .word-btn { border-left: 3px solid #f59e0b; }
  .cat-3  .word-btn { border-left: 3px solid #ef4444; }
  .cat-4  .word-btn { border-left: 3px solid #8b5cf6; }
  .cat-5  .word-btn { border-left: 3px solid #06b6d4; }
  .cat-6  .word-btn { border-left: 3px solid #f97316; }
  .cat-7  .word-btn { border-left: 3px solid #84cc16; }
  .cat-8  .word-btn { border-left: 3px solid #ec4899; }
  .cat-9  .word-btn { border-left: 3px solid #a78bfa; }
  .cat-10 .word-btn { border-left: 3px solid #34d399; }
  .cat-11 .word-btn { border-left: 3px solid #fb923c; }
  .cat-12 .word-btn { border-left: 3px solid #38bdf8; }

  #controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #111827;
    border-top: 1px solid #1e293b;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 100;
  }
  #controls label { font-size: 11px; color: #64748b; white-space: nowrap; }
  #speed { flex: 1; accent-color: #3b82f6; }
  #speed-val { font-size: 12px; color: #94a3b8; width: 28px; text-align: right; }
  #stop-btn {
    background: #7f1d1d;
    border: 1px solid #991b1b;
    border-radius: 8px;
    color: #fca5a5;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
  }
  #no-results {
    text-align: center;
    color: #475569;
    padding: 60px 20px;
    font-size: 15px;
    display: none;
  }
</style>
</head>
<body class="lang-ja">

<header>
  <h1>🎮 FPS</h1>
  <input type="text" id="search" placeholder="検索 / buscar..." autocomplete="off">
  <div id="lang-toggle">
    <button class="lang-btn active" data-lang="ja">日本語</button>
    <button class="lang-btn" data-lang="es">Español</button>
  </div>
</header>

<div id="tabs"></div>

<div id="content">
  <div id="search-results"></div>
  <div id="no-results">見つかりませんでした / No encontrado</div>
  <div id="categories"></div>
</div>

<div id="controls">
  <label>速度</label>
  <input type="range" id="speed" min="0.5" max="1.8" step="0.1" value="1.0">
  <span id="speed-val">1.0</span>
  <button id="stop-btn">■ 停止</button>
</div>

let currentLang = 'ja';
let currentCat = 0;
let speechRate = 1.0;

// Build tabs
const tabsEl = document.getElementById('tabs');
DATA.forEach((cat, i) => {
  const t = document.createElement('div');
  t.className = 'tab' + (i === 0 ? ' active' : '');
  t.textContent = `${cat.icon} ${cat.name}`;
  t.addEventListener('click', () => selectCat(i));
  tabsEl.appendChild(t);
});

// Build categories
const catsEl = document.getElementById('categories');
DATA.forEach((cat, ci) => {
  const div = document.createElement('div');
  div.className = `category cat-${ci}` + (ci === 0 ? ' active' : '');
  const grid = document.createElement('div');
  grid.className = 'word-grid';
  cat.words.forEach(w => grid.appendChild(makeBtn(w, ci)));
  div.appendChild(grid);
  catsEl.appendChild(div);
});

function makeBtn(word, ci) {
  const btn = document.createElement('button');
  btn.className = 'word-btn';

  const ja = document.createElement('span');
  ja.className = 'w-ja';
  ja.textContent = word[0];

  const es = document.createElement('span');
  es.className = 'w-es';
  es.textContent = word[1];

  btn.appendChild(ja);
  btn.appendChild(es);
  btn.addEventListener('click', () => speak(currentLang === 'ja' ? word[0] : word[1], btn));
  return btn;
}

function selectCat(i) {
  currentCat = i;
  document.querySelectorAll('.tab').forEach((t, idx) => t.classList.toggle('active', idx === i));
  document.querySelectorAll('.category').forEach((c, idx) => c.classList.toggle('active', idx === i));
  document.getElementById('search-results').classList.remove('active');
  document.getElementById('categories').style.display = '';
  document.getElementById('no-results').style.display = 'none';
  document.getElementById('search').value = '';
}

// Language toggle
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    currentLang = this.dataset.lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b === this));
    document.body.className = 'lang-' + currentLang;
    // Update speak handlers in search results
    document.getElementById('stop-btn').click();
  });
});

// Search
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.trim();
  const srEl = document.getElementById('search-results');
  const catsContainer = document.getElementById('categories');
  const noResults = document.getElementById('no-results');

  if (!q) {
    srEl.classList.remove('active');
    srEl.innerHTML = '';
    catsContainer.style.display = '';
    noResults.style.display = 'none';
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === currentCat));
    document.querySelectorAll('.category').forEach((c, i) => c.classList.toggle('active', i === currentCat));
    return;
  }

  srEl.innerHTML = '';
  srEl.classList.add('active');
  catsContainer.style.display = 'none';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  let found = 0;
  DATA.forEach((cat, ci) => {
    const matches = cat.words.filter(w => w[0].includes(q) || w[1].toLowerCase().includes(q.toLowerCase()));
    if (!matches.length) return;
    found += matches.length;

    const label = document.createElement('div');
    label.className = 'category-label';
    label.textContent = `${cat.icon} ${cat.name}`;
    srEl.appendChild(label);

    const grid = document.createElement('div');
    grid.className = `word-grid cat-${ci}`;
    matches.forEach(w => grid.appendChild(makeBtn(w, ci)));
    srEl.appendChild(grid);
  });

  noResults.style.display = found === 0 ? 'block' : 'none';
});

// Speech
let currentBtn = null;

function speak(text, btn) {
  window.speechSynthesis.cancel();
  if (currentBtn) currentBtn.classList.remove('playing');

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = currentLang === 'ja' ? 'ja-JP' : 'es-ES';
  utter.rate = speechRate;
  utter.pitch = 1.0;
  utter.volume = 1.0;

  const voices = window.speechSynthesis.getVoices();
  const voice = voices.find(v => v.lang.startsWith(currentLang === 'ja' ? 'ja' : 'es'));
  if (voice) utter.voice = voice;

  currentBtn = btn;
  btn.classList.add('playing');
  utter.onend = () => { btn.classList.remove('playing'); currentBtn = null; };
  utter.onerror = () => { btn.classList.remove('playing'); currentBtn = null; };

  window.speechSynthesis.speak(utter);
}

document.getElementById('speed').addEventListener('input', function() {
  speechRate = parseFloat(this.value);
  document.getElementById('speed-val').textContent = speechRate.toFixed(1);
});

document.getElementById('stop-btn').addEventListener('click', () => {
  window.speechSynthesis.cancel();
  if (currentBtn) { currentBtn.classList.remove('playing'); currentBtn = null; }
});

window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
</script>

</html>
